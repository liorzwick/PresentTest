name: Run Test Bot (Lab Mode)

# הפעלה ידנית פשוטה בלחיצת כפתור
on:
  workflow_dispatch:

jobs:
  run-test:
    runs-on: ubuntu-latest

    steps:
    # 1. משיכת הקוד מהמאגר שלך
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. התקנת סביבת פייתון
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. התקנת הספריות הדרושות
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install yfinance pandas numpy requests

    # 4. הרצת קוד המעבדה (ללא צורך בטלגרם או שמירת נתונים)
    - name: Run Test Bot
      run: |
        python bot.py
